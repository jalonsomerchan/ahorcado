<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Ahorcado Multijugador</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4338ca', light: '#a5b4fc' }
          }
        }
      }
    }
  </script>
  <style>
    .screen { display: none; }
    .screen.active { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop .3s ease forwards; }
    @keyframes toast-in { from{opacity:0;transform:translate(-50%,-12px)} to{opacity:1;transform:translate(-50%,0)} }
    .animate-toast { animation: toast-in .2s ease forwards; }
  </style>
</head>
<body class="h-full bg-gray-950 text-white font-sans select-none">

<main id="app" class="h-full max-w-md mx-auto flex flex-col">

  <!-- ═══ SCREEN: LOGIN ══════════════════════════════════════════════════════ -->
  <section id="screen-login" class="screen active items-center justify-center gap-8 px-6 py-10">

    <div class="text-center">
      <div class="text-7xl mb-3">🪢</div>
      <h1 class="text-4xl font-black tracking-tight">Ahorcado</h1>
      <p class="text-gray-500 mt-1 text-sm">Multijugador</p>
    </div>

    <!-- Saved user -->
    <div id="login-saved" class="hidden w-full space-y-3">
      <p class="text-center text-gray-400 text-sm">Bienvenido de nuevo,</p>
      <p id="login-saved-name" class="text-center text-2xl font-bold text-indigo-400"></p>
      <button id="btn-continue-user"
        class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition-all py-3 px-4 rounded-xl font-bold text-white">
        Continuar
      </button>
      <button id="btn-new-user"
        class="w-full bg-gray-800 hover:bg-gray-700 active:scale-95 transition-all py-3 px-4 rounded-xl font-semibold text-gray-300">
        Usar otro nombre
      </button>
    </div>

    <!-- New user form -->
    <div id="login-new-form" class="w-full space-y-3">
      <input id="input-username" type="text" placeholder="Tu nombre de jugador" maxlength="20"
        autocomplete="off" autocorrect="off" spellcheck="false"
        class="w-full bg-gray-800 border border-gray-700 focus:border-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition-colors text-center text-lg" />
      <button id="btn-create-account"
        class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 disabled:opacity-50 transition-all py-3 px-4 rounded-xl font-bold text-white">
        Jugar
      </button>
    </div>

  </section>

  <!-- ═══ SCREEN: LOBBY ══════════════════════════════════════════════════════ -->
  <section id="screen-lobby" class="screen px-6 py-8 gap-5">

    <div class="text-center shrink-0">
      <p class="text-gray-500 text-xs uppercase tracking-wide">Jugando como</p>
      <p id="lobby-username" class="text-xl font-bold text-indigo-400 mt-0.5"></p>
    </div>

    <button id="btn-create-room"
      class="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 disabled:opacity-50 transition-all py-4 rounded-xl font-bold text-lg shrink-0">
      Crear Sala
    </button>

    <div class="flex items-center gap-3 shrink-0">
      <div class="flex-1 h-px bg-gray-800"></div>
      <span class="text-gray-600 text-sm">o únete</span>
      <div class="flex-1 h-px bg-gray-800"></div>
    </div>

    <div class="w-full space-y-3 shrink-0">
      <input id="join-code" type="text" placeholder="CÓDIGO DE SALA" maxlength="8"
        autocomplete="off" autocorrect="off" spellcheck="false"
        class="w-full bg-gray-800 border border-gray-700 focus:border-indigo-500 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none transition-colors text-center text-xl tracking-widest font-mono uppercase" />
      <button id="btn-join-room"
        class="w-full bg-gray-700 hover:bg-gray-600 active:scale-95 disabled:opacity-50 transition-all py-3 px-4 rounded-xl font-bold text-white">
        Unirse a Sala
      </button>
    </div>

  </section>

  <!-- ═══ SCREEN: WAITING ROOM ══════════════════════════════════════════════ -->
  <section id="screen-waiting" class="screen px-6 py-5 gap-4">

    <!-- Header -->
    <div class="flex items-center justify-between shrink-0">
      <div>
        <p class="text-gray-500 text-xs uppercase tracking-wide">Código de sala</p>
        <p id="waiting-room-code" class="text-3xl font-black tracking-widest text-indigo-400 font-mono"></p>
      </div>
      <div class="flex gap-2">
        <button id="btn-share-room" title="Compartir"
          class="w-10 h-10 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-xl flex items-center justify-center text-lg transition-all">
          📤
        </button>
        <button id="btn-show-qr" title="Código QR"
          class="w-10 h-10 bg-gray-800 hover:bg-gray-700 active:scale-95 rounded-xl flex items-center justify-center text-xs font-bold transition-all">
          QR
        </button>
      </div>
    </div>

    <!-- QR -->
    <div id="qr-container" class="hidden w-full flex justify-center py-2 shrink-0"></div>

    <!-- Players -->
    <div class="shrink-0">
      <p class="text-gray-500 text-xs uppercase tracking-wide mb-2">
        Jugadores <span id="player-count" class="text-indigo-400 font-bold">0</span>
      </p>
      <ul id="player-list" class="space-y-2"></ul>
    </div>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- Host controls -->
    <div id="host-controls" class="hidden w-full space-y-3 shrink-0 pb-4">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 space-y-3">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Configuración</p>
        <label class="flex items-center justify-between">
          <span class="text-sm text-gray-400">Tiempo por turno</span>
          <select id="setting-turn-time"
            class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white">
            <option value="10">10s</option>
            <option value="15">15s</option>
            <option value="30" selected>30s</option>
            <option value="45">45s</option>
            <option value="60">60s</option>
          </select>
        </label>
        <label class="flex items-center justify-between">
          <span class="text-sm text-gray-400">Errores máximos</span>
          <select id="setting-max-errors"
            class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white">
            <option value="4">4</option>
            <option value="6" selected>6</option>
            <option value="8">8</option>
            <option value="10">10</option>
          </select>
        </label>
      </div>
      <button id="btn-start-game"
        class="w-full bg-green-600 hover:bg-green-500 active:scale-95 disabled:opacity-50 transition-all py-4 rounded-xl font-bold text-lg">
        ▶ Comenzar Partida
      </button>
    </div>

    <!-- Guest waiting -->
    <div id="guest-waiting-msg" class="hidden w-full shrink-0 pb-4">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 text-center space-y-3">
        <p class="text-gray-400 text-sm">Esperando al host para iniciar...</p>
        <div class="flex justify-center gap-1.5">
          <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:0ms"></span>
          <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:150ms"></span>
          <span class="w-2 h-2 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:300ms"></span>
        </div>
      </div>
    </div>

  </section>

  <!-- ═══ SCREEN: GAME ══════════════════════════════════════════════════════ -->
  <section id="screen-game" class="screen px-4 py-3 gap-3">

    <!-- Header -->
    <div class="flex items-center justify-between shrink-0">
      <span id="game-category" class="text-indigo-400 text-xs font-bold uppercase tracking-widest"></span>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-600">Sala: <span id="game-room-code" class="text-gray-400 font-mono"></span></span>
        <span id="error-count" class="text-xs font-bold text-red-400"></span>
      </div>
    </div>

    <!-- Hangman + Scores -->
    <div class="flex gap-3 shrink-0">
      <!-- SVG Hangman -->
      <div class="w-28 h-[120px] shrink-0">
        <svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
          <!-- Gallows -->
          <line x1="8" y1="125" x2="112" y2="125" stroke="#374151" stroke-width="5" stroke-linecap="round"/>
          <line x1="28" y1="125" x2="28" y2="5" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
          <line x1="28" y1="5" x2="72" y2="5" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
          <line x1="72" y1="5" x2="72" y2="22" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
          <!-- Body parts -->
          <circle id="hangman-head" cx="72" cy="34" r="12" stroke="#ef4444" stroke-width="3" fill="none" opacity="0" style="transition:opacity .4s"/>
          <line id="hangman-body" x1="72" y1="46" x2="72" y2="88" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0" style="transition:opacity .4s"/>
          <line id="hangman-arm-left" x1="72" y1="60" x2="50" y2="78" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0" style="transition:opacity .4s"/>
          <line id="hangman-arm-right" x1="72" y1="60" x2="94" y2="78" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0" style="transition:opacity .4s"/>
          <line id="hangman-leg-left" x1="72" y1="88" x2="50" y2="116" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0" style="transition:opacity .4s"/>
          <line id="hangman-leg-right" x1="72" y1="88" x2="94" y2="116" stroke="#ef4444" stroke-width="3" stroke-linecap="round" opacity="0" style="transition:opacity .4s"/>
        </svg>
      </div>

      <!-- Timer + Scores -->
      <div class="flex-1 flex flex-col gap-2 min-w-0">
        <div class="flex items-baseline gap-1">
          <span class="text-gray-600 text-xs">⏱</span>
          <span id="timer" class="text-2xl font-bold tabular-nums text-white">30</span>
          <span class="text-gray-600 text-xs">s</span>
        </div>
        <div id="scores-table" class="space-y-1 overflow-hidden"></div>
      </div>
    </div>

    <!-- Phrase display -->
    <div id="phrase-display" class="flex flex-wrap justify-center shrink-0 min-h-[3rem] py-1"></div>

    <!-- Wrong letters -->
    <div class="text-center shrink-0 -mt-1">
      <span class="text-xs text-gray-600 uppercase tracking-wide">Falladas: </span>
      <span id="wrong-letters" class="text-sm text-red-400 font-mono font-semibold"></span>
    </div>

    <!-- Turn indicator -->
    <p id="turn-indicator" class="text-center font-bold text-base text-gray-400 shrink-0"></p>

    <!-- Keyboard -->
    <div id="keyboard" class="flex flex-wrap gap-1.5 justify-center shrink-0"></div>

    <!-- Phrase guess -->
    <div class="shrink-0 space-y-2 pb-3">
      <button id="btn-guess-phrase" class="hidden w-full bg-gray-800 hover:bg-gray-700 active:scale-95 transition-all py-2 rounded-xl text-sm font-semibold text-gray-300">
        Adivinar frase completa
      </button>
      <div id="phrase-input-area" style="display:none" class="gap-2">
        <input id="input-phrase-guess" type="text" placeholder="Escribe la frase…"
          autocomplete="off" autocorrect="off"
          class="flex-1 bg-gray-800 border border-gray-700 focus:border-indigo-500 rounded-xl px-3 py-2 text-white placeholder-gray-600 focus:outline-none text-sm" />
        <button id="btn-submit-phrase"
          class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition-all px-4 py-2 rounded-xl font-bold text-sm">
          OK
        </button>
      </div>
    </div>

  </section>

  <!-- ═══ SCREEN: RESULTS ═══════════════════════════════════════════════════ -->
  <section id="screen-results" class="screen px-6 py-10 items-center gap-6">

    <div class="text-center space-y-2 shrink-0 w-full">
      <p id="result-outcome" class="text-2xl font-black"></p>
      <p class="text-gray-500 text-xs uppercase tracking-wide">La frase era</p>
      <p id="result-phrase" class="text-white font-bold text-xl"></p>
    </div>

    <div id="results-list" class="w-full space-y-2 shrink-0"></div>

    <div class="flex-1"></div>

    <div class="w-full space-y-3 shrink-0 pb-2">
      <button id="btn-play-again"
        class="hidden w-full bg-indigo-600 hover:bg-indigo-500 active:scale-95 disabled:opacity-50 transition-all py-4 rounded-xl font-bold text-lg">
        Nueva Partida
      </button>
      <p id="waiting-new-game" class="hidden text-center text-gray-500 text-sm">
        Esperando al host para nueva partida...
      </p>
    </div>

  </section>

</main>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/GameAPI.js"></script>
<script src="js/game.js" type="module"></script>
</body>
</html>
